name: publish

# Trusted Publishing → PyPI on tag push.
# No static tokens — PyPI verifies the GitHub Actions OIDC identity
# against the trusted-publisher entry configured at
# https://pypi.org/manage/project/ogunscan/settings/publishing/
#
# To cut a release:
#   1. Bump version in pyproject.toml + src/ogunscan/__init__.py
#   2. Commit
#   3. git tag v0.1.2 && git push origin v0.1.2
#   This workflow builds + publishes automatically.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(grep -E '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          MODULE_VERSION=$(grep -E "^__version__" src/ogunscan/__init__.py | sed -E "s/.*'([^']+)'.*/\1/")
          echo "tag=$TAG pyproject=$PYPROJECT_VERSION module=$MODULE_VERSION"
          if [ "$TAG" != "$PYPROJECT_VERSION" ] || [ "$TAG" != "$MODULE_VERSION" ]; then
            echo "::error::Tag v$TAG does not match pyproject ($PYPROJECT_VERSION) or module ($MODULE_VERSION) version"
            exit 1
          fi

      - name: Run tests before building
        run: python tests/test_ogunscan.py

      - name: Build distributions
        run: python -m build

      - name: Twine check
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing, OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ogunscan/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
